# services/file-storage/docker-compose.storage.yml
services:
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    # Host ports moved to 9100/9101 to avoid clashing with Superset's
    # frontend dev-server (which uses :9000). In-container ports stay 9000/9001,
    # so file-storage (S3_ENDPOINT=http://minio:9000) is unaffected.
    ports: ["9100:9000", "9101:9001"]
    volumes: ["minio_data:/data"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: superset
      POSTGRES_PASSWORD: superset
      POSTGRES_DB: superset
    ports: ["5442:5432"]
    volumes: ["pg_data:/var/lib/postgresql/data"]

  file-storage:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg2://superset:superset@postgres:5432/superset
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: files
      API_KEY: change-me-dev-key
    ports: ["8000:8000"]
    depends_on:
      minio: {condition: service_healthy}
      postgres: {condition: service_started}
    networks:
      - default
      - superset_shared

volumes:
  minio_data:
  pg_data:

networks:
  # Shared bridge so the Superset proxy (separate compose stack) can reach
  # this service by the hostname "file-storage". Created externally:
  #   docker network create superset_shared
  superset_shared:
    external: true
