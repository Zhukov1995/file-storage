# Build & push the file-storage image to GitHub Container Registry.
# Triggers ONLY on release tags (e.g. v1.0.0) so git-tag == docker-tag, mirroring
# the superset_tech image build (see superset_tech/.github/workflows/techpeople-build.yml).
name: Build & push image

on:
  push:
    tags:
      - "v*"

# Allow the built-in GITHUB_TOKEN to push packages to ghcr.io — no external secrets needed.
permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version and image name
        # ghcr.io requires the repository name to be lowercase; github.repository
        # keeps the original org casing, so force it down. Strip the leading "v"
        # from the tag so the image tag is a clean version (v1.0.0 -> 1.0.0).
        run: |
          echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
